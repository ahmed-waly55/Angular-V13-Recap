<img class="img-fluid m-1" *ngIf="isImagShown" [src]="storeInfo.image" alt="ITI IMAGE">
<button type="button" class="btn btn-primary" (click)="isImagShown = !isImagShown">Toggle Image</button>
<h1>{{storeInfo.name}}</h1>

<h3>Our Branches</h3>
<ul>
  <li *ngFor="let branch of storeInfo.branches">{{branch}}</li>
</ul>
